<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>360 Viewer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#panorama {
  width: 100%;
  height: 100%;
}

#controls {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99999;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 8px;
}

button {
  padding: 8px 14px;
  font-size: 14px;
  cursor: pointer;
  margin: 0 5px;
}

#frameLabel {
  color: white;
  font-family: Arial, sans-serif;
  font-weight: bold;
  margin-left: 10px;
}
</style>

</head>

<body>

<div id="controls">
  <button onclick="prevFrame()">◀ Previous</button>
  <button onclick="nextFrame()">Next ▶</button>
  <span id="frameLabel"></span>
</div>

<div id="panorama"></div>

<script>

const params = new URLSearchParams(window.location.search);
const img = params.get("img");

if (!img) {
  document.body.innerHTML = "<h2 style='color:white'>No image provided</h2>";
} else {

  const match = img.match(/frame_(\d+)\.jpg/i);
  let currentFrame = match ? parseInt(match[1], 10) : 1;

  document.getElementById("frameLabel").innerText =
    "Frame " + currentFrame;

  pannellum.viewer("panorama", {
    type: "equirectangular",
    panorama: img,
    autoLoad: true,
    showControls: true,

    // 🔥 THIS FIXES YOUR ORIENTATION
    yaw: 180
  });

  function buildURL(frameNumber) {
    const padded = String(frameNumber).padStart(5, "0");

    return "https://SNGROOMS.github.io/GoPro_Test/viewer.html?img=https://SNGROOMS.github.io/GoPro_Test/frame_" +
      padded +
      ".jpg";
  }

  window.nextFrame = function () {
    currentFrame++;
    window.location.href = buildURL(currentFrame);
  };

  window.prevFrame = function () {
    if (currentFrame > 1) {
      currentFrame--;
    }
    window.location.href = buildURL(currentFrame);
  };

}
</script>

</body>
</html>
