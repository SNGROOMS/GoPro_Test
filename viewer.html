<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>360 Viewer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#panorama {
  width: 100%;
  height: 100%;
}

#controls {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 10px;
  z-index: 9999;
}

button {
  margin: 0 5px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 14px;
}

#label {
  color: white;
  font-family: Arial;
  font-weight: bold;
  margin-left: 10px;
}
</style>
</head>

<body>

<div id="controls">
  <button onclick="prevFrame()">◀ Prev</button>
  <button onclick="nextFrame()">Next ▶</button>
  <span id="label"></span>
</div>

<div id="panorama"></div>

<script>

const BASE = "https://SNGROOMS.github.io/GoPro_Test/";

// -----------------------------
// GET INITIAL IMAGE FROM URL
// -----------------------------
const params = new URLSearchParams(window.location.search);

let img = params.get("img");

// fallback safety
if (!img) {
  document.body.innerHTML = "<h2 style='color:white'>No image provided</h2>";
  throw new Error("Missing image parameter");
}

// extract frame number from filename
let match = img.match(/frame_(\d+)\.jpg/i);
let frame = match ? parseInt(match[1], 10) : 10;

// -----------------------------
// HELPERS
// -----------------------------
function pad(n) {
  return String(n).padStart(5, "0");
}

function getFrameName(n) {
  return "frame_" + pad(n) + ".jpg";
}

function getImageURL(n) {
  return BASE + getFrameName(n);
}

function getViewerURL(n) {
  return BASE + "viewer.html?img=" + getImageURL(n) + "&frame=" + n;
}

// -----------------------------
// LOAD PANORAMA
// -----------------------------
let viewer = pannellum.viewer("panorama", {
  type: "equirectangular",
  panorama: img,
  autoLoad: true,
  showControls: true,
  yaw: 180   // your 180° correction
});

// -----------------------------
// UI LABEL
// -----------------------------
function updateLabel() {
  document.getElementById("label").innerText = "Frame " + frame;
}

updateLabel();

// -----------------------------
// CORE NAVIGATION FUNCTION
// -----------------------------
function goToFrame(n) {

  frame = n;

  // update URL so ArcGIS / EB can track state
  const url = new URL(window.location.href);
  url.searchParams.set("img", getImageURL(frame));
  url.searchParams.set("frame", frame);

  window.history.replaceState({}, "", url);

  // reload viewer content
  viewer.destroy();

  viewer = pannellum.viewer("panorama", {
    type: "equirectangular",
    panorama: getImageURL(frame),
    autoLoad: true,
    showControls: true,
    yaw: 180
  });

  updateLabel();
}

// -----------------------------
// NEXT / PREV
// -----------------------------
function nextFrame() {
  goToFrame(frame + 10);   // IMPORTANT: your step size is 10
}

function prevFrame() {
  if (frame <= 10) return;
  goToFrame(frame - 10);
}

</script>

</body>
</html>
