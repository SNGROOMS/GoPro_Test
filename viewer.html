<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>360 Viewer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#panorama {
  width: 100%;
  height: 100%;
}

#controls {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 10px;
  z-index: 9999;
}

button {
  margin: 0 5px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 14px;
}

#label {
  color: white;
  font-family: Arial;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="controls">
  <button onclick="prev()">◀ Prev</button>
  <button onclick="next()">Next ▶</button>
  <span id="label"></span>
</div>

<div id="panorama"></div>

<script>

const BASE = "https://SNGROOMS.github.io/GoPro_Test/";

// ------------------------------
// GET INITIAL IMAGE
// ------------------------------
const params = new URLSearchParams(window.location.search);
let img = params.get("img");

if (!img) {
  document.body.innerHTML = "<h2 style='color:white'>No image provided</h2>";
  throw new Error("Missing img parameter");
}

// extract current frame number
let match = img.match(/frame_(\d+)\.jpg/i);
let frame = match ? parseInt(match[1], 10) : 1;

// ------------------------------
// FRAME HELPERS
// ------------------------------
function pad(n) {
  return String(n).padStart(5, "0");
}

function frameName(n) {
  return "frame_" + pad(n) + ".jpg";
}

function frameURL(n) {
  return BASE + frameName(n);
}

function viewerURL(n) {
  return BASE + "viewer.html?img=" + frameURL(n) + "&frame=" + n;
}

// ------------------------------
// LOAD VIEWER
// ------------------------------
let viewer = pannellum.viewer("panorama", {
  type: "equirectangular",
  panorama: img,
  autoLoad: true,
  showControls: true,
  yaw: 180
});

function updateLabel() {
  document.getElementById("label").innerText = "Frame " + frame;
}

updateLabel();

// ------------------------------
// CORE NAVIGATION
// ------------------------------
function goTo(n) {

  frame = n;

  // update URL (important for ArcGIS sync if used later)
  const url = new URL(window.location.href);
  url.searchParams.set("img", frameURL(frame));
  url.searchParams.set("frame", frame);
  window.history.replaceState({}, "", url);

  // reload viewer
  viewer.destroy();

  viewer = pannellum.viewer("panorama", {
    type: "equirectangular",
    panorama: frameURL(frame),
    autoLoad: true,
    showControls: true,
    yaw: 180
  });

  updateLabel();
}

// ------------------------------
// NAV BUTTONS (FIXED LOGIC)
// ------------------------------
function next() {
  goTo(frame + 1);
}

function prev() {
  if (frame <= 1) return;
  goTo(frame - 1);
}

</script>

</body>
</html>
