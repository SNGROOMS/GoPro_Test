<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>360 Viewer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#panorama {
  width: 100%;
  height: 100%;
}

#controls {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  background: rgba(0,0,0,0.65);
  padding: 10px 14px;
  border-radius: 10px;
}

button {
  padding: 8px 14px;
  font-size: 14px;
  cursor: pointer;
  margin: 0 5px;
}

#frameLabel {
  color: white;
  font-family: Arial;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="controls">
  <button id="prevBtn">◀ Previous</button>
  <button id="nextBtn">Next ▶</button>
  <span id="frameLabel"></span>
</div>

<div id="panorama"></div>

<script>

// -------------------------
// CONFIG
// -------------------------
const BASE = "https://SNGROOMS.github.io/GoPro_Test/";
const VIEWER = BASE + "viewer.html";

// -------------------------
// GET CURRENT IMAGE
// -------------------------
const params = new URLSearchParams(window.location.search);
const img = params.get("img");

if (!img) {
  document.body.innerHTML = "<h2 style='color:white'>No image provided</h2>";
  throw new Error("No image");
}

// -------------------------
// EXTRACT FRAME NUMBER
// -------------------------
const match = img.match(/frame_(\d+)\.jpg/i);
let currentFrame = match ? parseInt(match[1], 10) : 1;

// -------------------------
// SAFE URL BUILDER
// -------------------------
function getFrameName(n) {
  return "frame_" + String(n).padStart(5, "0") + ".jpg";
}

function getImageURL(frameNum) {
  return BASE + getFrameName(frameNum);
}

function getViewerURL(frameNum) {
  return VIEWER + "?img=" + getImageURL(frameNum);
}

// -------------------------
// UI
// -------------------------
function updateLabel() {
  document.getElementById("frameLabel").innerText =
    "Frame " + currentFrame;
}

// -------------------------
// INIT PANORAMA
// -------------------------
pannellum.viewer("panorama", {
  type: "equirectangular",
  panorama: img,
  autoLoad: true,
  showControls: true,
  yaw: 180
});

updateLabel();

// -------------------------
// BUTTONS
// -------------------------
document.getElementById("nextBtn").onclick = function () {
  currentFrame++;
  window.location.href = getViewerURL(currentFrame);
};

document.getElementById("prevBtn").onclick = function () {
  if (currentFrame <= 1) return;
  currentFrame--;
  window.location.href = getViewerURL(currentFrame);
};

</script>

</body>
</html>
